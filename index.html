<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Blitz:Mind Vault Game</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <h1> 🧠Brain Blitz-Mind Vault</h1>
    
    <div class="stats">
       <p id="attempts">Attempts:0</p>
       <p id="clues">Clues Found:0</p>
       <p id="timer">Time: 0s</p>
       <p id="bestTime">Best Time:</p>
    </div>
    <div id="gameContainer">
      <div id="memoryBoard"></div>
      <div id="clueContainer">
        <h3 id ="uc">Unlocked Clues</h3>
        <ul id="clueList"></ul>
      </div>
    </div>
       <hr>

      <h2>Vault Code Breaker</h2>

    <p id="message">Find matches to reveal clues!!</p>

    <input id="secretCode" maxlength="8" placeholder="Enter 8-digit Code" required pattern="\d{8}">
    <button id ="submit">Submit</button>
    
    <br><br>
    <button id="restart">Restart</button>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
